<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 280px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .logo { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .sub { font-size: 0.85rem; opacity: 0.7; margin-bottom: 2rem; }
    .status { font-size: 0.9rem; color: #93c5fd; min-height: 1.5em; }
  </style>
</head>
<body>
  <div class="logo">LinScio MedComm</div>
  <div class="sub">医学科普写作智能体</div>
  <div class="status" id="status">正在启动...</div>
</body>
</html>
