# 宝塔 Nginx 反向代理配置 · LinScio 门户系统
# 域名规划（全栈合并版）：linscio.com.cn（根域 301→www）、www、app、admin、registry、hub、api
# api.linscio.com.cn 为全局唯一 API 入口（F1）
# 用法：在宝塔「网站」中添加站点后，将此内容合并到站点配置
# 前提：Docker Compose 已启动，各服务仅监听 127.0.0.1（3000/3001/8001/5003=registry-proxy/5002=registry-ui）
# 建议：在宝塔站点设置中开启「强制 HTTPS」

# 根域：301 跳转至 www
server {
    listen 80;
    listen 443 ssl http2;
    server_name linscio.com.cn;

    # SSL 由宝塔申请后自动填充
    return 301 https://www.linscio.com.cn$request_uri;
}

# 门户主站（对外主入口）
server {
    listen 80;
    listen 443 ssl http2;
    server_name www.linscio.com.cn;

    # SSL 由宝塔申请后自动填充，例如：
    # ssl_certificate /www/server/panel/vhost/cert/www.linscio.com.cn/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/www.linscio.com.cn/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API 后端（全局唯一入口，F1）
server {
    listen 80;
    listen 443 ssl http2;
    server_name api.linscio.com.cn;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# 项目演示站 app（可选：若部署了 app 前端则指向其静态或端口）
# server {
#     listen 80;
#     listen 443 ssl http2;
#     server_name app.linscio.com.cn;
