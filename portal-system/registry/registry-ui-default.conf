# 自定义 Nginx 配置：使用 Docker 内置 DNS (resolver) 在请求时解析 linscio-registry，
# 避免启动时 "host not found in upstream"（与 joxit/docker-registry-ui 原配置兼容）
server {
    listen 80;
    server_name localhost;
    client_max_body_size 0;
    client_body_buffer_size 32k;
    client_header_buffer_size 8k;
    large_client_header_buffers 8 64k;
    chunked_transfer_encoding on;
    proxy_ssl_server_name on;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_ignore_headers "X-Accel-Buffering";

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
    }

    location /v2 {
        resolver 127.0.0.11 valid=10s;
        set $registry_upstream linscio-registry:5000;
        proxy_http_version 1.1;
        proxy_pass http://$registry_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
