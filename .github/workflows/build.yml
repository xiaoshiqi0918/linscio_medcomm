# LinScio MedComm 三平台构建 + 可选腾讯云 COS 上传
#
# 产物：macOS arm64 / macOS x64 / Windows x64（与 matrix 一致）
#
# 上传到 COS 需在仓库 Settings → Secrets 中配置：
#   TENCENT_COS_SECRET_ID
#   TENCENT_COS_SECRET_KEY
#   TENCENT_COS_BUCKET    （格式：bucketname-APPID）
#   TENCENT_COS_REGION    （如 ap-guangzhou）
# 可选：
#   TENCENT_COS_PREFIX    （对象键前缀，默认 medcomm/releases）
#
# 对象路径：{PREFIX}/v{package.json version}/{platform}/文件名
# 例如：medcomm/releases/v0.1.0/darwin-arm64/LinScio MedComm-0.1.0-arm64.dmg
#
# PR 不执行上传；未配置密钥时跳过上传（成功退出）。
name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-14
            pip_platform: macosx_11_0_arm64
            pbs_platform: aarch64-apple-darwin-install_only
            electron_args: '--mac'
          - platform: darwin-x64
            os: macos-14
            pip_platform: macosx_10_9_x86_64
            pbs_platform: x86_64-apple-darwin-install_only
            electron_args: '--mac --x64'
          - platform: win32-x64
            os: windows-latest
            pip_platform: win_amd64
            pbs_platform: x86_64-pc-windows-msvc-shared-install_only
            electron_args: '--win'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python (for pip download)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install npm deps
        run: npm ci

      - name: Pre-download wheels (${{ matrix.platform }})
        shell: bash
        run: |
          mkdir -p build/wheels/${{ matrix.platform }}/
          pip download -r backend/requirements.txt \
            --platform ${{ matrix.pip_platform }} --python-version 3.11 \
            --only-binary=:all: -d build/wheels/${{ matrix.platform }}/
          pip install --no-index --find-links=build/wheels/${{ matrix.platform }}/ \
            -r backend/requirements.txt --dry-run

      - name: Download python-build-standalone (3.11.7, locked 20240107)
        shell: bash
        run: |
          mkdir -p build
          curl -sSL "https://github.com/astral-sh/python-build-standalone/releases/download/20240107/cpython-3.11.7+20240107-${{ matrix.pbs_platform }}.tar.gz" \
            -o build/python-standalone.tar.gz
          tar -xzf build/python-standalone.tar.gz -C build
          mv build/cpython-3.11* build/python

      - name: Install backend deps (for Alembic migration check)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-index --find-links=build/wheels/${{ matrix.platform }}/ \
            -r backend/requirements.txt 2>/dev/null \
            || python -m pip install -r backend/requirements.txt

      - name: Verify Alembic single head
        shell: bash
        run: bash scripts/ci-alembic-check.sh

      - name: Build frontend
        run: npm run build

      - name: Build Electron (${{ matrix.platform }})
        run: npx electron-builder ${{ matrix.electron_args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (${{ matrix.platform }})
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: dist/

      - name: Upload installers to Tencent COS
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          COS_PREFIX: ${{ secrets.TENCENT_COS_PREFIX }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: bash scripts/ci-cos-upload.sh
