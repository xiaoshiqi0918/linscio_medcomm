# LinScio MedComm — Windows x64 构建
#
# 产物：Windows x64 NSIS 安装包（.exe）
# 打包完成后通过 GitHub Actions Artifacts 下载，手动上传至 COS。
name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install npm dependencies
        run: npm ci

      # ① 下载 Windows wheels（跳过 uvloop 等 Unix-only 依赖）
      - name: Download Python wheels (win_amd64)
        shell: bash
        run: |
          set -euo pipefail
          REQ="backend/requirements.txt"
          WHEEL_DIR="build/wheels/win32-x64"
          mkdir -p "$WHEEL_DIR"

          # uvicorn[standard] 的 uvloop 仅限 Unix；Windows 用基础版
          TMP_REQ="build/.tmp-req-win.txt"
          sed 's/uvicorn\[standard\]/uvicorn/g' "$REQ" > "$TMP_REQ"

          # sdist-only 包单独处理
          SDIST_RE='^\s*(jieba|bibtexparser)'
          grep -vE "$SDIST_RE" "$TMP_REQ" > build/.tmp-req-binary.txt

          echo "==> Phase 1: binary wheels"
          python -m pip download -r build/.tmp-req-binary.txt \
            --platform win_amd64 --python-version 3.11 \
            --only-binary=:all: -d "$WHEEL_DIR/"

          echo "==> Phase 2: sdist-only packages"
          SDIST_PKGS=$(grep -E "$SDIST_RE" "$TMP_REQ" | tr '\n' ' ' || true)
          if [ -n "$SDIST_PKGS" ]; then
            python -m pip wheel $SDIST_PKGS -w "$WHEEL_DIR/"
            rm -f "$WHEEL_DIR/"*.tar.gz "$WHEEL_DIR/"*.zip 2>/dev/null || true
          fi

          echo "==> Wheels count: $(ls "$WHEEL_DIR/"*.whl 2>/dev/null | wc -l)"
          rm -f build/.tmp-req-win.txt build/.tmp-req-binary.txt

      # ② 下载 Windows Python standalone（嵌入到安装包）
      - name: Download Python standalone (3.11.11)
        shell: bash
        run: |
          curl -sSL -o build/python-standalone.tar.gz \
            "https://github.com/astral-sh/python-build-standalone/releases/download/20241205/cpython-3.11.11+20241205-x86_64-pc-windows-msvc-shared-install_only.tar.gz"
          tar -xzf build/python-standalone.tar.gz -C build
          if [ ! -d build/python ]; then
            mv build/cpython-3.11* build/python
          fi
          echo "Python: $(build/python/python.exe --version)"

      # ③ 预装 Python 依赖到嵌入式 Python（打包前，运行时不再 pip install）
      - name: Install deps into embedded Python
        shell: bash
        run: |
          # uvicorn[standard] → uvicorn for Windows
          TMP_REQ="build/.tmp-req-win.txt"
          sed 's/uvicorn\[standard\]/uvicorn/g' backend/requirements.txt > "$TMP_REQ"

          build/python/python.exe -m pip install \
            --no-index --find-links=build/wheels/win32-x64/ \
            -r "$TMP_REQ" --quiet
          echo "Installed packages: $(build/python/python.exe -m pip list --format=columns 2>/dev/null | wc -l)"
          rm -f "$TMP_REQ"

      # ④ Alembic 迁移检查
      - name: Verify Alembic single head
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt --quiet
          bash scripts/ci-alembic-check.sh

      # ⑤ 构建前端
      - name: Build frontend
        run: npm run build

      # ⑥ Electron 打包
      - name: Build Electron (win-x64)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ⑦ 上传构建产物到 GitHub Artifacts（保留 7 天）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LinScio-MedComm-win-x64
          path: |
            release/*.exe
            release/*.exe.blockmap
          retention-days: 7
