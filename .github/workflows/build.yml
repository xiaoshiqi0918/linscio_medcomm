# LinScio MedComm — Windows x64 构建（备用 CI，主要在 Windows 本机打包）
#
# 本地打包首选：scripts\build-win.bat（含 ComfyUI + 模型）
# CI 备用：不含 ComfyUI（5GB 太大），仅生成基础安装包
name: Build Windows (CI fallback)

on:
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install npm dependencies
        run: npm ci

      # ① 下载 Windows wheels
      - name: Download Python wheels (win_amd64)
        shell: bash
        run: |
          set -euo pipefail
          REQ="backend/requirements.txt"
          WHEEL_DIR="build/wheels/win32-x64"
          mkdir -p "$WHEEL_DIR"

          TMP_REQ="build/.tmp-req-win.txt"
          sed 's/uvicorn\[standard\]/uvicorn/g' "$REQ" > "$TMP_REQ"

          SDIST_RE='^\s*(jieba|bibtexparser)'
          grep -vE "$SDIST_RE" "$TMP_REQ" > build/.tmp-req-binary.txt

          echo "==> Phase 1: binary wheels"
          python -m pip download -r build/.tmp-req-binary.txt \
            --platform win_amd64 --python-version 3.11 \
            --only-binary=:all: -d "$WHEEL_DIR/"

          echo "==> Phase 2: sdist-only packages"
          SDIST_PKGS=$(grep -E "$SDIST_RE" "$TMP_REQ" | tr '\n' ' ' || true)
          if [ -n "$SDIST_PKGS" ]; then
            python -m pip wheel $SDIST_PKGS -w "$WHEEL_DIR/"
            rm -f "$WHEEL_DIR/"*.tar.gz "$WHEEL_DIR/"*.zip 2>/dev/null || true
          fi

          echo "==> Wheels count: $(ls "$WHEEL_DIR/"*.whl 2>/dev/null | wc -l)"
          rm -f build/.tmp-req-win.txt build/.tmp-req-binary.txt

      # ② 下载 Windows Python standalone
      - name: Download Python standalone (3.11.11)
        shell: bash
        run: |
          curl -sSL -o build/python-standalone.tar.gz \
            "https://github.com/astral-sh/python-build-standalone/releases/download/20241205/cpython-3.11.11+20241205-x86_64-pc-windows-msvc-install_only.tar.gz"
          tar -xzf build/python-standalone.tar.gz -C build
          if [ ! -d build/python ]; then
            mv build/cpython-3.11* build/python
          fi
          echo "Python: $(build/python/python.exe --version)"

      # ③ 预装 Python 依赖到嵌入式 Python
      - name: Install deps into embedded Python
        shell: bash
        run: |
          TMP_REQ="build/.tmp-req-win.txt"
          sed 's/uvicorn\[standard\]/uvicorn/g' backend/requirements.txt > "$TMP_REQ"

          build/python/python.exe -m pip install \
            --no-index --find-links=build/wheels/win32-x64/ \
            --no-warn-script-location \
            -r "$TMP_REQ" --quiet
          echo "Installed packages: $(build/python/python.exe -m pip list --format=columns 2>/dev/null | wc -l)"
          rm -f "$TMP_REQ"

      # ④ Alembic 迁移检查
      - name: Verify Alembic single head
        shell: bash
        run: |
          python -m pip install --upgrade pip --no-warn-script-location
          python -m pip install -r backend/requirements.txt --quiet --no-warn-script-location
          bash scripts/ci-alembic-check.sh

      # ⑤ 构建前端
      - name: Build frontend
        run: npm run build

      # ⑥ 读取版本号（供后续步骤引用）
      - name: Get version
        id: version
        shell: bash
        run: echo "ver=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      # ⑦ Electron 打包
      - name: Build Electron (win-x64)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ⑧ 上传构建产物到 GitHub Artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LinScio-MedComm-${{ steps.version.outputs.ver }}-win-x64
          path: |
            releases/v${{ steps.version.outputs.ver }}/*.exe
            releases/v${{ steps.version.outputs.ver }}/*.exe.blockmap
          retention-days: 14
